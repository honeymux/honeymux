name: Release

on:
  push:
    tags:
      - "v*"
      # Tags ending in -test are reserved for dry-run bootstrap; they do not auto-release.
      - "!v*-test"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to build and publish
        required: true
        type: string
      dry_run:
        description: Create a DRAFT release for testing (not published, not public)
        default: false
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml
    with:
      matrix: |
        [
          {"name": "darwin-arm64", "runner": "macos-15"},
          {"name": "darwin-x64", "runner": "macos-15-intel"},
          {"name": "linux-arm64", "runner": "ubuntu-24.04-arm"},
          {"name": "linux-x64", "runner": "ubuntu-latest"}
        ]
      ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}
      upload_artifacts: true

  release:
    name: publish release
    needs: build-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}

      - name: Ensure tag is reachable from main
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor HEAD FETCH_HEAD; then
            echo "::error::Tag ${GITHUB_REF_NAME} (commit ${GITHUB_SHA}) is not reachable from main; refusing to publish"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          awk -v header="## $TAG" '
            $0 == header || index($0, header " ") == 1 { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "ERROR: no CHANGELOG.md section found for tag $TAG" >&2
            exit 1
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum hmx-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2.6.0
        with:
          files: |
            dist/hmx-*
            dist/SHA256SUMS
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true

      - name: Create draft release (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2.6.0
        with:
          files: |
            dist/hmx-*
            dist/SHA256SUMS
          tag_name: ${{ github.event.inputs.release_tag }}-dryrun
          name: "[DRAFT] ${{ github.event.inputs.release_tag }}"
          body_path: release-notes.md
          draft: true
          fail_on_unmatched_files: true
