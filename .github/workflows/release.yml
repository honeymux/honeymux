name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to build and publish
        required: true
        type: string

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.11
  ZIG_VERSION: 0.15.2

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: darwin-x64
            runner: macos-15-intel
          - name: darwin-arm64
            runner: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}
      - name: Check out OpenTUI source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: _deps/opentui
          repository: anomalyco/opentui

      - name: Check out ghostty-opentui source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: _deps/ghostty-opentui
          repository: remorses/ghostty-opentui

      - name: Link patch source repos
        run: |
          mkdir -p ~/src
          ln -s "$GITHUB_WORKSPACE/_deps/opentui" ~/src/opentui
          ln -s "$GITHUB_WORKSPACE/_deps/ghostty-opentui" ~/src/ghostty-opentui

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Verify toolchain
        run: |
          bun --version
          zig version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --target bun src/index.tsx --outfile dist/hmx-${{ matrix.name }}

      - name: Smoke test binary
        run: ./dist/hmx-${{ matrix.name }} -V

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hmx-${{ matrix.name }}
          path: dist/hmx-${{ matrix.name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum hmx-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2.6.0
        with:
          files: |
            dist/hmx-*
            dist/SHA256SUMS
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
