name: Build and test

on:
  workflow_call:
    inputs:
      matrix:
        description: JSON array of {name, runner} entries for strategy.matrix.include
        required: true
        type: string
      ref:
        default: ""
        description: Ref passed to the main repo checkout (defaults to github.ref when empty)
        required: false
        type: string
      upload_artifacts:
        default: false
        description: Whether to upload built binaries as workflow artifacts
        required: false
        type: boolean

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.11
  ZIG_VERSION: 0.15.2

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Check out external patch sources
        run: |
          mkdir -p ~/src
          git clone https://github.com/anomalyco/opentui.git ~/src/opentui
          git clone https://github.com/remorses/ghostty-opentui.git ~/src/ghostty-opentui

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Verify toolchain
        run: |
          bun --version
          zig version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build binary
        run: bun build --compile --target bun src/index.tsx --outfile dist/hmx-${{ matrix.name }}

      - name: Smoke test binary
        run: ./dist/hmx-${{ matrix.name }} -V

      - name: Upload artifact
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          if-no-files-found: error
          name: hmx-${{ matrix.name }}
          path: dist/hmx-${{ matrix.name }}
