name: Verify (static)

on:
  workflow_call:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.13

jobs:
  verify:
    name: run format, lint, semgrep, typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate takumi shim
        run: bun scripts/generate-takumi-shim.ts

      - name: Format check
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Semgrep
        uses: docker://semgrep/semgrep@sha256:326e5f41cc972bb423b764a14febbb62bbad29ee1c01820805d077dd868fea48 # v1.161.0
        with:
          entrypoint: semgrep
          args: scan --config=p/typescript --config=p/security-audit --error --metrics=off src/

      - name: Type check
        run: bun run typecheck
