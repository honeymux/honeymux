version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Patched deps — patches/series.json must be bumped in lockstep and patches
      # re-exported against the new tag. Update manually.
      - dependency-name: "@opentui/core"
      - dependency-name: "@opentui/react"
      - dependency-name: "ghostty-opentui"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
