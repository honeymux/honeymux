name: Release

on:
  push:
    tags:
      - "v*"
      # Tags ending in -test are reserved for dry-run bootstrap; they do not auto-release.
      - "!v*-test"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to build and publish
        required: true
        type: string
      dry_run:
        description: Create a DRAFT release for testing (not published, not public)
        default: false
        required: false
        type: boolean

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.11
  ZIG_VERSION: 0.15.2

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: darwin-x64
            runner: macos-15-intel
          - name: darwin-arm64
            runner: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}
      - name: Check out OpenTUI source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          path: _deps/opentui
          repository: anomalyco/opentui

      - name: Check out ghostty-opentui source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          path: _deps/ghostty-opentui
          repository: remorses/ghostty-opentui

      - name: Link patch source repos
        run: |
          mkdir -p ~/src
          ln -s "$GITHUB_WORKSPACE/_deps/opentui" ~/src/opentui
          ln -s "$GITHUB_WORKSPACE/_deps/ghostty-opentui" ~/src/ghostty-opentui

      - name: Set up Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Verify toolchain
        run: |
          bun --version
          zig version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --target bun src/index.tsx --outfile dist/hmx-${{ matrix.name }}

      - name: Smoke test binary
        run: ./dist/hmx-${{ matrix.name }} -V

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hmx-${{ matrix.name }}
          path: dist/hmx-${{ matrix.name }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}

      - name: Ensure tag is reachable from main
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor HEAD FETCH_HEAD; then
            echo "::error::Tag ${GITHUB_REF_NAME} (commit ${GITHUB_SHA}) is not reachable from main; refusing to publish"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          awk -v header="## $TAG" '
            $0 == header || index($0, header " ") == 1 { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "ERROR: no CHANGELOG.md section found for tag $TAG" >&2
            exit 1
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum hmx-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2.6.0
        with:
          files: |
            dist/hmx-*
            dist/SHA256SUMS
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true

      - name: Create draft release (dry run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        uses: softprops/action-gh-release@26e8ad27a09a225049a7075d7ec1caa2df6ff332 # v2.6.0
        with:
          files: |
            dist/hmx-*
            dist/SHA256SUMS
          tag_name: ${{ github.event.inputs.release_tag }}-dryrun
          name: "[DRAFT] ${{ github.event.inputs.release_tag }}"
          body_path: release-notes.md
          draft: true
          fail_on_unmatched_files: true
