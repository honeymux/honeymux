# tmux config — honeymux docs screenshot fixture.
#
# Approximates a catppuccin-mocha status line (flat-sided pills with a
# rounded left cap, nerd-font icons) without any plugin runtime. Values
# in the right-side modules are mocked so screenshots stay reproducible
# across machines. The window list is omitted — honeymux's own tab bar
# already shows it. Session and active window names are also omitted;
# honeymux already surfaces those in chrome.

set -g mouse on
set -g default-terminal "tmux-256color"

# Pane borders.
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#cba6f7"

# Status line base.
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 100
set -g status-right-length 200

# Collapse the status line to just status-left + status-right. The default
# status-format interpolates #{W:...} which expands to the window list;
# we override it to drop that. #{T:...} triggers template expansion so
# the inner format variables inside status-left/status-right are resolved.
set -g status-format[0] "#[align=left]#{T;=/#{status-left-length}:status-left}#[align=right]#{T;=/#{status-right-length}:status-right}"

# Hostname pill on the far left. Hardcoded label (not #H) so docs
# screenshots are reproducible across machines.
set -g status-left "#[fg=#fab387,bg=#1e1e2e]#[fg=#1e1e2e,bg=#fab387,bold] #[fg=#cdd6f4,bg=#313244,nobold] honeymux "

# Right-side modules: cpu | ram | uptime | battery.
set -g status-right ""
set -ag status-right "#[fg=#a6e3a1,bg=#1e1e2e]#[fg=#1e1e2e,bg=#a6e3a1,bold] #[fg=#cdd6f4,bg=#313244,nobold] 12% "
set -ag status-right "#[fg=#f9e2af,bg=#1e1e2e]#[fg=#1e1e2e,bg=#f9e2af,bold] #[fg=#cdd6f4,bg=#313244,nobold] 3.4G "
set -ag status-right "#[fg=#cba6f7,bg=#1e1e2e]#[fg=#1e1e2e,bg=#cba6f7,bold] #[fg=#cdd6f4,bg=#313244,nobold] 2d 4h "
set -ag status-right "#[fg=#f38ba8,bg=#1e1e2e]#[fg=#1e1e2e,bg=#f38ba8,bold] #[fg=#cdd6f4,bg=#313244,nobold] 87% "

# Message / mode styling — match mocha palette.
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"
set -g mode-style "bg=#45475a,fg=#cdd6f4"
